<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Accountant Reports</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${billingMessage}" class="alert"
         th:classappend="${billingLevel == 'danger'} ? ' alert-danger' : (${billingLevel == 'warning'} ? ' alert-warning' : ' alert-success')"
         th:text="${billingMessage}"></div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="mb-1" th:text="${reportTitle}">Accountant Sales Reports</h3>
            <p class="text-muted mb-0">
                Sales summary for
                <span th:text="${reportShopName}">Current Shop</span>.
            </p>
        </div>
        <div class="d-flex gap-2">
            <a th:href="${reportPrintLink}" class="btn btn-danger" target="_blank">Print / Save PDF</a>
            <a th:href="${reportBackLink}" class="btn btn-outline-secondary">Dashboard</a>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <div class="text-muted">Total Sales</div>
                    <div class="fs-3 fw-bold" th:text="${#numbers.formatDecimal(totalSales, 1, 'COMMA', 0, 'POINT')} + ' TZS'">0 TZS</div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <div class="text-muted">Total Profit</div>
                    <div class="fs-3 fw-bold" th:text="${#numbers.formatDecimal(totalProfit, 1, 'COMMA', 0, 'POINT')} + ' TZS'">0 TZS</div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <div class="text-muted">Items Sold</div>
                    <div class="fs-3 fw-bold" th:text="${totalQuantity}">0</div>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body">
            <div th:if="${#lists.isEmpty(sales)}" class="text-muted">No sales found.</div>
            <div th:unless="${#lists.isEmpty(sales)}" class="table-responsive">
                <table class="table table-striped align-middle">
                    <thead>
                    <tr>
                        <th>Product</th>
                        <th>Quantity</th>
                        <th>Total</th>
                        <th>Profit</th>
                        <th>Date</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="saleItem : ${sales}">
                        <td th:text="${saleItem.product != null ? saleItem.product.name : '-'}">-</td>
                        <td th:text="${saleItem.quantity}">0</td>
                        <td th:text="${#numbers.formatDecimal(saleItem.total, 1, 'COMMA', 0, 'POINT')} + ' TZS'">0 TZS</td>
                        <td th:text="${#numbers.formatDecimal(saleItem.profit, 1, 'COMMA', 0, 'POINT')} + ' TZS'">0 TZS</td>
                        <td th:text="${saleItem.dateTime != null ? #temporals.format(saleItem.dateTime, 'dd-MM-yyyy HH:mm') : '-'}">-</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
