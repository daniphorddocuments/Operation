<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{fragments/ui :: head('Fire and Rescue Force Operation Management System | Landing', false)}"></th:block>
<body class="ui-body landing-plain landing-clean" th:attr="data-lang=${currentLang},data-page='landing-dashboard'">
<th:block th:replace="~{fragments/header :: landingHeader}"></th:block>

<div class="ui-shell landing-shell-clean landing-minimal-shell">
    <main class="landing-clean-flow landing-main-clean landing-minimal-main">
        <section class="skeleton-landing-board" id="overview">
            <div class="skeleton-landing-grid skeleton-landing-grid-only">
                <section class="skeleton-announcement-panel" aria-label="Public announcement area">
                    <div class="skeleton-announcement-media skeleton-announcement-media-only">
                        <div class="landing-showcase-track" data-landing-slider>
                            <article th:each="slide, slideStat : ${landingCarouselSlides}"
                                     class="landing-showcase-slide"
                                     th:classappend="${slideStat.index == 0} ? ' is-active' : ''">
                                <img th:src="${slide.imageUrl}" th:alt="${slide.title}" decoding="async">
                            </article>
                            <article th:if="${#lists.isEmpty(landingCarouselSlides)}" class="landing-showcase-slide is-active">
                                <img th:src="@{/images/portal-hero-reference.png}" alt="Operational public information display" decoding="async">
                            </article>
                        </div>
                    </div>
                </section>

                <aside class="skeleton-action-panel" aria-label="Emergency public access">
                    <h2 class="skeleton-action-title">Report Incident or Call 114</h2>
                    <p class="skeleton-panel-copy">Use the emergency reporting path for structured submission, or call the public safety line immediately for urgent response.</p>
                    <div class="skeleton-action-stack">
                        <a th:href="@{/public/emergency/report}" class="landing-btn landing-btn-primary">
                            <i class="fas fa-triangle-exclamation"></i>
                            <span>Report Incident</span>
                        </a>
                        <a href="tel:114" class="landing-btn landing-btn-secondary">
                            <i class="fas fa-phone"></i>
                            <span>Call 114</span>
                        </a>
                    </div>
                    <div class="skeleton-action-note">
                        Neutral background, high-contrast actions, and a simplified decision path for the public.
                    </div>
                </aside>
            </div>
        </section>
    </main>
</div>
<script>
    (function () {
        const slider = document.querySelector('[data-landing-slider]');
        if (!slider) {
            return;
        }
        const slides = Array.from(slider.querySelectorAll('.landing-showcase-slide'));
        if (slides.length < 2) {
            return;
        }
        let currentIndex = 0;
        window.setInterval(function () {
            slides[currentIndex].classList.remove('is-active');
            currentIndex = (currentIndex + 1) % slides.length;
            slides[currentIndex].classList.add('is-active');
        }, 5200);
    }());
</script>
<th:block th:replace="~{fragments/footer :: siteFooter}"></th:block>
</body>
</html>
