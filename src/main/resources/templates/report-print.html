<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Printable Report</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            color: #111827;
            margin: 0;
            background: #f8fafc;
        }

        .page {
            max-width: 960px;
            margin: 24px auto;
            background: #fff;
            padding: 32px;
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 24px;
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }

        .summary-card {
            border: 1px solid #dbe3ee;
            border-radius: 14px;
            padding: 16px;
            background: #f8fbff;
        }

        .summary-card .label {
            color: #64748b;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .summary-card .value {
            font-size: 22px;
            font-weight: 700;
            margin-top: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #dbe3ee;
            padding: 10px;
            text-align: left;
            font-size: 14px;
        }

        th {
            background: #eff6ff;
        }

        .actions {
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            padding: 10px 16px;
            border-radius: 999px;
            text-decoration: none;
            border: 1px solid #cbd5e1;
            color: #0f172a;
            background: #fff;
            margin-right: 8px;
        }

        .btn-primary {
            background: #b91c1c;
            color: #fff;
            border-color: #b91c1c;
        }

        @media print {
            body {
                background: #fff;
            }

            .page {
                margin: 0;
                box-shadow: none;
                max-width: none;
                padding: 0;
            }

            .actions {
                display: none;
            }
        }
    </style>
</head>
<body onload="window.print()">
<div class="page">
    <div class="actions">
        <button class="btn btn-primary" onclick="window.print()">Print / Save PDF</button>
        <a class="btn" th:href="${reportBackLink}">Back</a>
    </div>

    <div class="topbar">
        <div>
            <h1 th:text="${reportTitle}">Sales Report</h1>
            <p><strong>Shop:</strong> <span th:text="${reportShopName}">Current Shop</span></p>
            <p><strong>Prepared For:</strong> <span th:text="${loggedInUsername}">User</span></p>
        </div>
        <div>
            <p><strong>Generated:</strong></p>
            <p th:text="${reportGeneratedAt != null ? #temporals.format(reportGeneratedAt, 'dd-MM-yyyy HH:mm') : '-'}">-</p>
        </div>
    </div>

    <div class="summary">
        <div class="summary-card">
            <div class="label">Total Sales</div>
            <div class="value" th:text="${#numbers.formatDecimal(totalSales, 1, 'COMMA', 0, 'POINT')} + ' TZS'">0 TZS</div>
        </div>
        <div class="summary-card">
            <div class="label">Total Profit</div>
            <div class="value" th:text="${#numbers.formatDecimal(totalProfit, 1, 'COMMA', 0, 'POINT')} + ' TZS'">0 TZS</div>
        </div>
        <div class="summary-card">
            <div class="label">Items Sold</div>
            <div class="value" th:text="${totalQuantity}">0</div>
        </div>
    </div>

    <table>
        <thead>
        <tr>
            <th>Product</th>
            <th>Quantity</th>
            <th>Total</th>
            <th>Profit</th>
            <th>Date</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(sales)}">
            <td colspan="5">No sales found.</td>
        </tr>
        <tr th:each="saleItem : ${sales}">
            <td th:text="${saleItem.product != null ? saleItem.product.name : '-'}">-</td>
            <td th:text="${saleItem.quantity}">0</td>
            <td th:text="${#numbers.formatDecimal(saleItem.total, 1, 'COMMA', 0, 'POINT')} + ' TZS'">0 TZS</td>
            <td th:text="${#numbers.formatDecimal(saleItem.profit, 1, 'COMMA', 0, 'POINT')} + ' TZS'">0 TZS</td>
            <td th:text="${saleItem.dateTime != null ? #temporals.format(saleItem.dateTime, 'dd-MM-yyyy HH:mm') : '-'}">-</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
