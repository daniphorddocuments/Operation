<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h3 class="mb-0">Add Product</h3>
                        <a href="/manager/products" class="btn btn-outline-secondary btn-sm">Back</a>
                    </div>

                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

                    <form th:action="@{/manager/products/save}" method="post">
                        <div class="mb-3">
                            <label class="form-label" for="name">Product Name</label>
                            <input class="form-control" id="name" name="name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="cost">Cost</label>
                            <input class="form-control" id="cost" name="cost" type="number" min="0" step="0.01" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="price">Price</label>
                            <input class="form-control" id="price" name="price" type="number" min="0" step="0.01" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label" for="stock">Stock</label>
                            <input class="form-control" id="stock" name="stock" type="number" min="0" step="1" required>
                        </div>
                        <button class="btn btn-primary w-100" type="submit">Save Product</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
