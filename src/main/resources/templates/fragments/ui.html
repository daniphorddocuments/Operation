<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="head(title, charts)">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="_csrf" th:if="${_csrf != null}" th:content="${_csrf.token}">
        <meta name="_csrf_header" th:if="${_csrf != null}" th:content="${_csrf.headerName}">
        <title th:text="${title}">Fire and Rescue Force Operation Management System</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
        <link th:href="@{/ui/app-ui.css}" rel="stylesheet">
        <link th:href="@{/ui/design-refresh.css}" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
        <script th:if="${charts}" src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script th:src="@{/ui/app-ui.js}" defer></script>
    </head>
</th:block>
</body>
</html>
