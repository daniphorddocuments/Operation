<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manager Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="mb-1">Shop Staff</h3>
            <p class="text-muted mb-0">Manage users assigned to your shop.</p>
        </div>
        <div class="d-flex gap-2">
            <a href="/manager/users/add" class="btn btn-primary">Add User</a>
            <a href="/manager/dashboard" class="btn btn-outline-secondary">Dashboard</a>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body">
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${#lists.isEmpty(users)}" class="text-muted">No staff users found.</div>
            <div th:unless="${#lists.isEmpty(users)}" class="table-responsive">
                <table class="table table-striped align-middle">
                    <thead>
                    <tr>
                        <th>Username</th>
                        <th>Role</th>
                        <th>Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="userItem : ${users}">
                        <td th:text="${userItem.username}">username</td>
                        <td th:text="${userItem.role}">role</td>
                        <td>
                            <form th:action="@{/manager/users/{id}/delete(id=${userItem.id})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
