<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Receipt</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background:#fff;
            font-family: monospace;
        }

        .receipt {
            width:350px;
            margin:50px auto;
            border:1px solid #ddd;
            padding:20px;
        }

        .center { text-align:center; }

        .btn-print {
            display:block;
            margin:20px auto;
        }
    </style>
</head>
<body>

<div class="receipt">

    <h5 class="center">DUKA SYSTEM</h5>
    <p class="center">Risiti ya Mauzo</p>

    <hr>

    <p><strong>Bidhaa:</strong> <span th:text="${sale.product != null ? sale.product.name : '-'}"></span></p>
    <p><strong>Bei kwa kila item:</strong> <span th:text="${sale.product != null ? #numbers.formatDecimal(sale.product.price, 1, 'COMMA', 0, 'POINT') : 0}"></span> TZS</p>
    <p><strong>Kiasi:</strong> <span th:text="${sale.quantity}"></span></p>

    <hr>

    <h5>Jumla ya bei: <span th:text="${#numbers.formatDecimal(sale.total, 1, 'COMMA', 0, 'POINT')}"></span> TZS</h5>

    <hr>

    <p><strong>Tarehe:</strong>
        <span th:text="${#temporals.format(sale.dateTime,'dd-MM-yyyy HH:mm')}"></span>
    </p>

    <p><strong>Lipa / Control Number:</strong>
        <span th:text="${sale.shop != null && sale.shop.paymentNumber != null && !sale.shop.paymentNumber.isBlank() ? sale.shop.paymentNumber : 'Haijawekwa'}"></span>
    </p>

    <p class="center" th:text="|Karibu tena duka la ${sale.shop != null ? sale.shop.name : 'Mahanga Shop'}|">Karibu tena duka la Mahanga Shop</p>
    <p class="center" style="font-style:italic;">God Is able</p>

</div>

<button onclick="window.print()" class="btn btn-primary btn-print">
    Print Receipt
</button>

</body>
</html>
