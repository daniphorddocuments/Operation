spring.application.name=operation-system

# =====================
# SERVER
# =====================
server.port=${SERVER_PORT:${PORT:8080}}

# =====================
# DATABASE
# =====================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/froms;MODE=PostgreSQL;AUTO_SERVER=TRUE;AUTO_SERVER_PORT=0}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

# =====================
# JPA / HIBERNATE
# =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=true

# =====================
# LOGGING (KUONA INSERT)
# =====================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

# =====================
# HIKARI (OPTIONAL)
# =====================
spring.datasource.hikari.maximum-pool-size=10
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:12MB}

# =====================
# H2
# =====================
spring.h2.console.enabled=false

# =====================
# BOOTSTRAP ACCESS
# =====================
froms.bootstrap.seed-default-admins=${FROMS_BOOTSTRAP_SEED_DEFAULT_ADMINS:false}
froms.bootstrap.admin.username=${FROMS_BOOTSTRAP_ADMIN_USERNAME:}
froms.bootstrap.admin.password=${FROMS_BOOTSTRAP_ADMIN_PASSWORD:}
froms.bootstrap.admin.full-name=${FROMS_BOOTSTRAP_ADMIN_FULL_NAME:}
froms.bootstrap.secondary-admin.username=${FROMS_BOOTSTRAP_SECONDARY_ADMIN_USERNAME:}
froms.bootstrap.secondary-admin.password=${FROMS_BOOTSTRAP_SECONDARY_ADMIN_PASSWORD:}
froms.bootstrap.secondary-admin.full-name=${FROMS_BOOTSTRAP_SECONDARY_ADMIN_FULL_NAME:}

# =====================
# SECURITY INTELLIGENCE
# =====================
froms.security.idle-warning-seconds=${FROMS_SECURITY_IDLE_WARNING_SECONDS:90}
froms.dispatch.emergency-number=${FROMS_DISPATCH_EMERGENCY_NUMBER:114}
froms.storage.login-carousel-dir=${FROMS_STORAGE_LOGIN_CAROUSEL_DIR:login-carousel}
