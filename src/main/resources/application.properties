spring.application.name=froms

# PORT (Render requirement)
server.port=${PORT:8080}

# SESSION & ERROR
server.servlet.session.timeout=15m
server.error.include-message=always
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.whitelabel.enabled=false

# =====================
# DATABASE (CRITICAL)
# =====================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari
spring.datasource.hikari.pool-name=froms-hikari-pool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:15}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}

# =====================
# JPA
# =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ⚠️ USIWEKE dialect manually
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect  ❌ REMOVE

# =====================
# CACHE
# =====================
spring.cache.type=simple

# =====================
# ACTUATOR
# =====================
management.endpoints.web.exposure.include=health,info,metrics,prometheus

# =====================
# LOGGING
# =====================
logging.level.root=INFO
logging.file.name=${LOG_FILE:logs/froms.log}

# =====================
# CUSTOM
# =====================
froms.storage.videos-dir=${VIDEOS_DIR:videos}
froms.storage.investigations-dir=${INVESTIGATIONS_DIR:investigations}