spring.application.name=froms

server.port=${PORT:8080}
server.servlet.session.timeout=15m
server.error.include-message=always
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.whitelabel.enabled=false

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.pool-name=froms-hikari-pool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:15}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=false

spring.cache.type=simple
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true
management.metrics.tags.application=${spring.application.name}

logging.level.root=INFO
logging.level.org.springframework.security=INFO
logging.level.com.daniphord.mahanga=INFO
logging.file.name=${LOG_FILE:logs/froms.log}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n

froms.security.session-timeout-seconds=${SESSION_TIMEOUT_SECONDS:900}
froms.storage.videos-dir=${VIDEOS_DIR:videos}
froms.storage.investigations-dir=${INVESTIGATIONS_DIR:investigations}
froms.ai.base-url=${FROMS_AI_BASE_URL:http://127.0.0.1:8091}
