version: "1"

databases:
  - name: operation-db
    plan: free

services:
  - type: web
    name: operation-app
    runtime: docker
    plan: starter
    autoDeployTrigger: commit
    healthCheckPath: /actuator/health

    dockerfilePath: ./Dockerfile
    dockerContext: .

    disk:
      name: operation-data
      mountPath: /app/data
      sizeGB: 1

    envVars:
      - key: PORT
        value: 10000

      - key: DATABASE_URL
        fromDatabase:
          name: operation-db
          property: connectionString

      - key: FROMS_STORAGE_VIDEOS_DIR
        value: /app/data/videos

      - key: FROMS_STORAGE_INVESTIGATIONS_DIR
        value: /app/data/investigations
