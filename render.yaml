services:
  - type: web
    name: pdf-dashboard-service
    env: java
    plan: free

    buildCommand: "./mvnw clean package -DskipTests"
    startCommand: "java -jar target/pdf-dashboard-system-1.0.0.jar"

    envVars:
      # ✅ DATABASE (IMPORTANT)
      - key: DATABASE_URL
        fromDatabase:
          name: pdf-dashboard-db
          property: connectionString

      # OPTIONAL SETTINGS
      - key: PORT
        value: 8080

      - key: VIDEOS_DIR
        value: videos

      - key: INVESTIGATIONS_DIR
        value: investigations

databases:
  - name: pdf-dashboard-db
    plan: free