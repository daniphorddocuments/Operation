services:
  - type: web
    name: pdf-dashboard-service
    env: java
    plan: free

    buildCommand: "./mvnw clean package -DskipTests"

    # ✅ FORCE PORT (VERY IMPORTANT)
    startCommand: "java -Dserver.port=$PORT -jar target/pdf-dashboard-system-1.0.0.jar"

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pdf-dashboard-db
          property: connectionString

      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: pdf-dashboard-db
          property: user

      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: pdf-dashboard-db
          property: password

      # ❌ USIWEKE PORT HAPA

      - key: DB_POOL_MAX_SIZE
        value: 15

      - key: DB_POOL_MIN_IDLE
        value: 5

      - key: SESSION_TIMEOUT_SECONDS
        value: 900

      - key: VIDEOS_DIR
        value: videos

      - key: INVESTIGATIONS_DIR
        value: investigations

databases:
  - name: pdf-dashboard-db
    plan: free