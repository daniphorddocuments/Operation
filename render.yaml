envVars:
  - key: SPRING_DATASOURCE_URL
    fromDatabase:
      name: pdf-dashboard-db
      property: connectionString

  - key: SPRING_DATASOURCE_USERNAME
    fromDatabase:
      name: pdf-dashboard-db
      property: user

  - key: SPRING_DATASOURCE_PASSWORD
    fromDatabase:
      name: pdf-dashboard-db
      property: password