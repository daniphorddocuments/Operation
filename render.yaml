services:
  - type: web
    name: pdf-dashboard-service
    env: java
    plan: free
    buildCommand: "./mvnw clean package -DskipTests"
    startCommand: "java -jar target/pdf-dashboard-system-1.0.0.jar"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pdf-dashboard-db
          property: connectionString
      - key: SPRING_PROFILES_ACTIVE
        value: production

databases:
  - name: pdf-dashboard-db
    plan: free